#root{width:100%;min-height:100vh}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}

.msg-in{animation:slideIn .25s ease}
input,textarea,button{-webkit-appearance:none;font-family:inherit}
input:focus{outline:none}
/* Tab bar */
.tabs{display:flex;border-bottom:2px solid #e5e7eb;background:white;flex-shrink:0}
.tab{flex:1;padding:12px 8px;border:none;background:none;cursor:pointer;font-weight:600;font-size:14px;color:#9ca3af;transition:.2s;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:#667eea;border-bottom-color:#667eea}
/* Vocab card */
.vcard{background:white;border-radius:16px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:12px;border:2px solid #e5e7eb;transition:.2s}
.vcard:hover{border-color:#667eea;transform:translateY(-2px)}
/* Quiz */
.quiz-opt{display:block;width:100%;text-align:left;padding:14px 18px;border:2px solid #e5e7eb;border-radius:12px;background:white;cursor:pointer;font-size:15px;font-weight:500;margin-bottom:10px;transition:.2s;font-family:inherit}
.quiz-opt:hover{border-color:#667eea;background:#f5f3ff}
.quiz-opt.correct{border-color:#10b981;background:#d1fae5;color:#065f46}
.quiz-opt.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}
/* Scenario card */
.scenario{background:white;border-radius:14px;padding:18px;border-left:4px solid #667eea;margin-bottom:12px;cursor:pointer;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.scenario:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}

/* ─── Speak: strips emoji, handles zh/en separately ─── */
const speak = (rawText) => {
  window.speechSynthesis.cancel();
  // Remove emojis, markdown, extra symbols
  let text = rawText
    .replace(/[\u{1F000}-\u{1FFFF}]/gu,'')
    .replace(/[\u{2600}-\u{27BF}]/gu,'')
    .replace(/[\u{FE00}-\u{FE0F}]/gu,'')
    .replace(/\*\*/g,'').replace(/\*/g,'')
    .replace(/#/g,'').replace(/📚|📖|🎯|💡|🔥|👑|🌱|📈/g,'')
    .replace(/\n+/g,' ').trim();

  // Split into segments by language
  const segs=[];
  let cur='', lang=null;
  for(const ch of text){
    const isZH=/[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/.test(ch);
    const l=isZH?'zh':'en';
    if(lang===null) lang=l;
    if(l!==lang && cur.trim()){
      segs.push({t:cur.trim(),l:lang});
      cur=ch; lang=l;
    } else { cur+=ch; }
  }
  if(cur.trim()) segs.push({t:cur.trim(),l:lang});

  segs.forEach(s=>{
    const u=new SpeechSynthesisUtterance(s.t);
    u.lang=s.l==='zh'?'zh-TW':'en-US';
    u.rate=s.l==='zh'?1.0:0.88;
    window.speechSynthesis.speak(u);
  });
};

/* ─── Simple Markdown renderer ─── */
const Markdown=({text})=>{
  const lines=text.split('\n');
  return(
    <span>
      {lines.map((line,i)=>(
        <span key={i}>
          {i>0&&<br/>}
          {line.split(/(\*\*.*?\*\*)/g).map((part,j)=>
            part.startsWith('**')&&part.endsWith('**')
              ?<strong key={j}>{part.slice(2,-2)}</strong>
              :<span key={j}>{part}</span>
          )}
        </span>
      ))}
    </span>
  );
};

/* ─── Microphone helper ─── */
const getMicPermission = async () => {
  if(location.protocol !== 'https:' && location.hostname !== 'localhost'){
    alert('語音功能需要 HTTPS。\n請確認你的網站已啟用 SSL（Vercel 預設已啟用）。');
    return false;
  }
  try{
    await navigator.mediaDevices.getUserMedia({audio:true});
    return true;
  }catch(e){
    alert('請在瀏覽器設定中允許麥克風存取。\nSafari: 設定 → 網站 → 麥克風\nChrome: 點擊網址列的鎖頭圖示');
    return false;
  }
};

const startSpeechRec = async (onResult, onEnd) => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('請使用 Chrome 或 Safari 瀏覽器使用語音功能'); return null; }
  const ok = await getMicPermission();
  if(!ok) return null;
  const r = new SR();
  r.lang='en-US'; r.continuous=false; r.interimResults=false;
  r.onresult = e => {
    const t=e.results[0][0].transcript, c=e.results[0][0].confidence;
    onResult(t, Math.round(c*100));
  };
  r.onerror = () => onEnd();
  r.onend   = () => onEnd();
  r.start();
  return r;
};

  const inputRef = useRef(null);  // uncontrolled input — fixes lag
  const msgEnd   = useRef(null);

  const isLesson = !!lesson;
  const systemPrompt = isLesson
    ? `You are an enthusiastic English teacher. The student is learning "${lesson.title}" (topics: ${lesson.topics.join(', ')}).

       Give warm encouragement. Use a mix of English and Traditional Chinese.
       Keep each reply to 2-4 sentences. Be engaging and natural.`
    : `You are a friendly, native-level English conversation partner.
       Have natural conversations on any topic. Gently note interesting vocabulary or grammar when relevant.
       Use a mix of English and Traditional Chinese. Be warm and encouraging.`;

  useEffect(()=>{
    const welcome = isLesson
      ? `Hi! 👋 Let's practice **${lesson.title}**!\n\n今天我們練習「${lesson.title}」。主題：${lesson.topics.slice(0,3).join('、')} 等。\n\n場景：${lesson.scenario}\n\n準備好了嗎？試著用英文開始說話！`

    setMsgs([{role:'assistant', content:welcome}]);
  },[]);

  useEffect(()=>{ msgEnd.current?.scrollIntoView({behavior:'smooth'}); },[msgs, busy]);

  const send = useCallback(async (text) => {
    if(!text.trim() || busy) return;
    setBusy(true);
    setMsgs(m=>[...m,{role:'user',content:text}]);
    try{
      const res = await fetch('/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:600,
          system:systemPrompt,
          messages:[...msgs,{role:'user',content:text}]
        })
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      if(d.error) throw new Error(d.error);
      setMsgs(m=>[...m,{role:'assistant',content:d.content[0].text}]);
      addXP(10);
    }catch(e){
      console.error(e);
      setMsgs(m=>[...m,{role:'assistant',content:`⚠️ 連線錯誤：${e.message}\n\n請確認 Vercel 已設定 ANTHROPIC_API_KEY 環境變數。`}]);
    }
    setBusy(false);
  },[msgs, busy, systemPrompt]);

  const handleKey = useCallback(e=>{
    if(e.key==='Enter' && !e.shiftKey && inputRef.current){
      const v=inputRef.current.value.trim();
      if(v){ inputRef.current.value=''; setSpFB(null); send(v); }
      e.preventDefault();
    }
  },[send]);

  const handleSend = useCallback(()=>{
    if(inputRef.current){
      const v=inputRef.current.value.trim();
      if(v){ inputRef.current.value=''; setSpFB(null); send(v); }
    }
  },[send]);

  const handleMic = async () => {
    if(recoding) return;
    setRec(true);
    await startSpeechRec(
      (txt, score) => {
        if(inputRef.current) inputRef.current.value = txt;
        setSpFB({text:txt,score});
        if(score>70) addXP(15);
      },
      () => setRec(false)
    );
  };

  const startRoleplay = (rp) => {
    setMsgs([{role:'assistant',content:`🎭 **${rp.title}**\n\n${rp.prompt}\n\n---\n準備好了嗎？開始吧！`}]);
    setTab('chat');
  };

  /* Quiz logic */
  const exercises = lesson?.exercises || [];
  const currentQ = exercises[quizState.idx];

  const answerQuiz = (i) => {
    if(quizState.chosen!==null) return;
    const correct = i===currentQ.ans;
    setQS(s=>({...s, chosen:i, score: s.score+(correct?1:0)}));
    if(correct) addXP(20);
  };

  const nextQ = () => {
    if(quizState.idx+1>=exercises.length){
      setQS(s=>({...s,done:true}));
    } else {
      setQS(s=>({...s,idx:s.idx+1,chosen:null}));
      setFillV(''); setFillR(null);
    }
  };

    const correct = fillVal.trim().toLowerCase()===currentQ.ans.toLowerCase();

        <button onClick={onBack} style={{background:'rgba(255,255,255,.2)',border:'1px solid rgba(255,255,255,.3)',color:'white',padding:'8px 14px',borderRadius:'8px',cursor:'pointer',fontWeight:700,fontSize:'13px',flexShrink:0}}>← 返回</button>

        </div>
        {isLesson&&<button onClick={onFinish} style={{background:'rgba(255,255,255,.2)',border:'1px solid rgba(255,255,255,.3)',color:'white',padding:'8px 14px',borderRadius:'8px',cursor:'pointer',fontWeight:700,fontSize:'13px',flexShrink:0}}>✅ 完成</button>}
      </div>

      {/* Tabs */}
      {hasTabs&&(
        <div className="tabs">
          {tabs.map(t=>(
            <button key={t} className={`tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>{tabLabel[t]}</button>
          ))}
        </div>
      )}

      {/* Chat Tab */}
      {tab==='chat'&&(
        <>
          <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:'12px'}}>
            {msgs.map((m,i)=>(
              <div key={i} className="msg-in" style={{alignSelf:m.role==='user'?'flex-end':'flex-start',maxWidth:'82%'}}>
                <div style={{
                  background:m.role==='user'?'linear-gradient(135deg,#667eea,#764ba2)':'white',
                  color:m.role==='user'?'white':'#1f2937',
                  padding:'12px 16px',
                  borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',
                  boxShadow:'0 2px 8px rgba(0,0,0,.08)',

                  <button key={i} className={`quiz-opt${quizState.chosen===i?(i===currentQ.ans?' correct':' wrong'):quizState.chosen!==null&&i===currentQ.ans?' correct':''}`}
                    onClick={()=>answerQuiz(i)} disabled={quizState.chosen!==null}>
                    <span style={{marginRight:'8px',fontWeight:700}}>{['A','B','C','D'][i]}.</span>{o}
                  </button>
                ))}

                {currentQ.type==='fill'&&(
                  <div>
                    <div style={{background:'#f3f4f6',borderRadius:'10px',padding:'12px',marginBottom:'12px',color:'#6b7280',fontSize:'14px'}}>
                      💡 提示：{currentQ.hint}
                    </div>
                    <div style={{display:'flex',gap:'10px'}}>
                      <input value={fillVal} onChange={e=>setFillV(e.target.value)}
                        onKeyDown={e=>e.key==='Enter'&&fillRes===null&&checkFill()}
                        placeholder="輸入你的答案..."
                        disabled={fillRes!==null}
                        style={{flex:1,padding:'12px 16px',border:`2px solid ${fillRes==='correct'?'#10b981':fillRes==='wrong'?'#ef4444':'#e5e7eb'}`,borderRadius:'10px',fontSize:'15px',outline:'none',fontFamily:'inherit'}}
                      />
                      {fillRes===null&&<button onClick={checkFill} style={{padding:'12px 20px',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',border:'none',borderRadius:'10px',fontWeight:700,cursor:'pointer'}}>確認</button>}
                    </div>
                    {fillRes&&(
                      <div style={{marginTop:'12px',padding:'12px 16px',borderRadius:'10px',
                        background:fillRes==='correct'?'#d1fae5':'#fee2e2',
                        color:fillRes==='correct'?'#065f46':'#991b1b',fontWeight:600}}>
                        {fillRes==='correct'?'✅ 正確！':'❌ 答案是：'+currentQ.ans}
                      </div>
                    )}
                  </div>
                )}
              </div>

              {(quizState.chosen!==null || fillRes!==null)&&(
                <button onClick={nextQ}
                  style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',border:'none',borderRadius:'14px',fontWeight:700,fontSize:'16px',cursor:'pointer'}}>
                  {quizState.idx+1<exercises.length?'下一題 →':'查看結果'}
                </button>
              )}
            </div>
          ) : (
            <p style={{color:'#9ca3af',textAlign:'center',padding:'40px'}}>目前沒有練習題</p>
          )}
        </div>
      )}

      {/* Roleplay Tab */}
      {tab==='roleplay'&&lesson&&(
        <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
          <h3 style={{fontWeight:800,marginBottom:'8px',color:'#1f2937'}}>🎭 情境模擬練習</h3>
          <p style={{color:'#6b7280',fontSize:'14px',marginBottom:'16px'}}>選一個情境，和 AI 進行角色扮演！</p>
          {lesson.roleplay.map((rp,i)=>(
            <div key={i} className="scenario" onClick={()=>startRoleplay(rp)}>
              <div style={{fontWeight:700,fontSize:'16px',color:'#1f2937',marginBottom:'6px'}}>{rp.title}</div>
              <div style={{fontSize:'14px',color:'#6b7280',lineHeight:1.5}}>{rp.prompt}</div>
              <div style={{marginTop:'10px',color:'#667eea',fontWeight:600,fontSize:'13px',display:'flex',alignItems:'center',gap:'4px'}}>
                <I.Play size={14}/> 點擊開始練習
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
});

/* ─── Pronunciation View ─── */
const PronunciationView = ({onBack, addXP}) => {
  const [idx,setIdx]     = useState(0);
  const [spFB,setSpFB]   = useState(null);
  const [recoding,setRec]= useState(false);
  const s = PRONUNCIATION_SENTENCES[idx];

  const handleMic = async () => {
    if(recoding) return;
    setRec(true); setSpFB(null);
    await startSpeechRec(
      (txt,score) => { setSpFB({text:txt,score}); if(score>70) addXP(15); },
      () => setRec(false)
    );
  };

  return(
    <div style={{background:'linear-gradient(135deg,#667eea,#764ba2)',minHeight:'100vh',padding:'16px'}}>
      <div style={{maxWidth:'600px',margin:'0 auto'}}>
        <div style={{background:'rgba(255,255,255,.96)',borderRadius:'18px',padding:'16px 18px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'12px',boxShadow:'0 8px 24px rgba(0,0,0,.1)'}}>
          <button onClick={onBack} style={{background:'linear-gradient(135deg,#667eea,#764ba2)',border:'none',color:'white',padding:'10px 16px',borderRadius:'10px',cursor:'pointer',fontWeight:700,flexShrink:0}}>← 返回</button>
          <div>
            <h2 style={{fontWeight:800,color:'#1f2937',margin:0}}>🎤 發音測試</h2>
            <p style={{color:'#6b7280',margin:'2px 0 0',fontSize:'13px'}}>{idx+1}/{PRONUNCIATION_SENTENCES.length} 句</p>
          </div>
        </div>

        <div style={{background:'rgba(255,255,255,.96)',borderRadius:'22px',padding:'32px 24px',textAlign:'center',marginBottom:'16px',boxShadow:'0 10px 30px rgba(0,0,0,.15)'}}>
          <div style={{fontSize:'13px',color:'#9ca3af',marginBottom:'6px'}}>📖 {s.zh}</div>
          <h3 style={{fontSize:'clamp(16px,4vw,24px)',fontWeight:700,color:'#1f2937',lineHeight:1.5,marginBottom:'20px'}}>{s.en}</h3>
          <div style={{display:'flex',justifyContent:'center',gap:'10px',flexWrap:'wrap',marginBottom:'16px'}}>
            <button onClick={()=>speak(s.en)}
              style={{display:'flex',alignItems:'center',gap:'6px',padding:'11px 20px',borderRadius:'12px',border:'2px solid #667eea',background:'white',color:'#667eea',fontWeight:700,cursor:'pointer'}}>
              <I.Sound size={17}/> 聽標準發音
            </button>
            <button onClick={handleMic} disabled={recoding}
              style={{display:'flex',alignItems:'center',gap:'6px',padding:'11px 20px',borderRadius:'12px',border:'none',color:'white',fontWeight:700,cursor:'pointer',
                background:recoding?'#dc2626':'linear-gradient(135deg,#ef4444,#dc2626)',
                animation:recoding?'pulse 1s infinite':'none'}}>
              <I.Mic size={17}/> {recoding?'錄音中...':'開始說話'}
            </button>
          </div>
          <div style={{display:'flex',justifyContent:'center',gap:'10px'}}>
            <button onClick={()=>{setSpFB(null);setIdx(i=>Math.max(0,i-1));}} style={{padding:'8px 18px',borderRadius:'10px',border:'2px solid #e5e7eb',background:'white',cursor:'pointer',fontWeight:600,color:'#6b7280'}}>← 上一句</button>
            <button onClick={()=>{setSpFB(null);setIdx(i=>Math.min(PRONUNCIATION_SENTENCES.length-1,i+1));}} style={{padding:'8px 18px',borderRadius:'10px',border:'2px solid #e5e7eb',background:'white',cursor:'pointer',fontWeight:600,color:'#6b7280'}}>下一句 →</button>
          </div>
        </div>

        {spFB&&(
          <div style={{background:'rgba(255,255,255,.96)',borderRadius:'20px',padding:'24px',textAlign:'center',marginBottom:'16px',boxShadow:'0 8px 24px rgba(0,0,0,.12)',animation:'slideIn .3s ease'}}>
            <div style={{width:'110px',height:'110px',margin:'0 auto 16px',borderRadius:'50%',
              background:`conic-gradient(${spFB.score>=80?'#10b981':spFB.score>=60?'#f59e0b':'#ef4444'} ${spFB.score*3.6}deg,#e5e7eb 0deg)`,
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{width:'82px',height:'82px',background:'white',borderRadius:'50%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:'28px',fontWeight:900,color:'#1f2937'}}>{spFB.score}</span>
                <span style={{fontSize:'11px',color:'#9ca3af'}}>/ 100</span>
              </div>
            </div>
            <div style={{background:'#f3f4f6',borderRadius:'10px',padding:'10px 14px',marginBottom:'12px',fontSize:'15px',color:'#374151',fontStyle:'italic'}}>"{spFB.text}"</div>
            <div style={{padding:'10px 16px',borderRadius:'10px',fontWeight:700,
              background:spFB.score>=80?'#d1fae5':spFB.score>=60?'#fef3c7':'#fee2e2',
              color:spFB.score>=80?'#065f46':spFB.score>=60?'#92400e':'#991b1b'}}>
              {spFB.score>=80?'🎉 太棒了！發音非常標準！':spFB.score>=60?'👍 不錯！繼續練習！':'💪 放慢速度，再試一次！'}
            </div>
          </div>
        )}

        <div style={{background:'rgba(255,255,255,.15)',borderRadius:'16px',padding:'16px 20px'}}>
          <h4 style={{color:'white',fontWeight:700,marginBottom:'10px'}}>💡 發音技巧</h4>
          {['先聽一遍，再模仿語調和節奏','注意英文的「連音」，自然地說出來','放慢速度，每個音節清楚發出','多重複練習，肌肉記憶很重要'].map((t,i)=>(
            <div key={i} style={{color:'rgba(255,255,255,.9)',fontSize:'13px',marginBottom:'5px',display:'flex',gap:'6px'}}>
              <span>•</span><span>{t}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ─── Home ─── */
const Home = ({profile, onLesson, onFreeChat, onPronunciation}) => {
  const xpForLevel = l => l * 500;
  const progress = () => {
    const lo=xpForLevel(profile.level-1),hi=xpForLevel(profile.level);
    return Math.min(((profile.totalXP-lo)/(hi-lo))*100,100);
  };
  const typeIcon = type => {
    const m={conversation:<I.Chat size={22}/>,vocabulary:<I.Book size={22}/>,listening:<I.Sound size={22}/>,
      pronunciation:<I.Mic size={22}/>,news:<I.News size={22}/>,media:<I.Film size={22}/>,
      reading:<I.Globe size={22}/>,writing:<I.Book size={22}/>};
    return m[type]||<I.Book size={22}/>;
  };

  return(
    <div style={{background:'linear-gradient(135deg,#667eea,#764ba2)',minHeight:'100vh',padding:'16px'}}>
      <div style={{maxWidth:'960px',margin:'0 auto'}}>
        {/* Hero */}
        <div style={{background:'rgba(255,255,255,.96)',borderRadius:'26px',padding:'44px 24px',textAlign:'center',marginBottom:'20px',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}>
          <div style={{fontSize:'48px',animation:'float 3s ease-in-out infinite',display:'inline-block'}}>✨</div>
          <h1 style={{fontSize:'clamp(28px,6vw,52px)',fontWeight:900,background:'linear-gradient(135deg,#667eea,#764ba2)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',margin:'12px 0 6px'}}>AI English Master</h1>
          <p style={{fontSize:'17px',color:'#6b7280',marginBottom:'20px'}}>AI 互動式英語學習平台</p>
          <div style={{display:'inline-flex',alignItems:'center',gap:'8px',background:'linear-gradient(135deg,#f59e0b,#d97706)',color:'white',padding:'10px 24px',borderRadius:'50px',fontWeight:700,fontSize:'17px',boxShadow:'0 8px 24px rgba(245,158,11,.3)'}}>
            <I.Trophy size={20}/> Level {profile.level}
          </div>
        </div>

        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginBottom:'20px'}}>
          {[
            {icon:<I.Zap size={28} style={{color:'#f59e0b'}}/>, val:profile.totalXP, lbl:'Total XP'},
            {icon:<I.Star size={28} style={{color:'#ef4444'}}/>,  val:profile.streak,  lbl:'🔥 連續天數'},
            {icon:<I.Award size={28} style={{color:'#10b981'}}/>, val:profile.completedLessons.length, lbl:'完成關卡'},
          ].map((s,i)=>(
            <div key={i} style={{background:'rgba(255,255,255,.96)',borderRadius:'18px',padding:'20px 12px',textAlign:'center',boxShadow:'0 8px 24px rgba(0,0,0,.08)'}}>
              {s.icon}
              <div style={{fontSize:'30px',fontWeight:800,color:'#1f2937',marginTop:'6px'}}>{s.val}</div>
              <div style={{fontSize:'12px',color:'#6b7280',marginTop:'3px'}}>{s.lbl}</div>
            </div>
          ))}
        </div>

        {/* XP Bar */}
        <div style={{background:'rgba(255,255,255,.96)',borderRadius:'16px',padding:'18px 20px',marginBottom:'20px',boxShadow:'0 8px 24px rgba(0,0,0,.08)'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontWeight:600,marginBottom:'6px',color:'#1f2937',fontSize:'14px'}}>
            <span>Level {profile.level} → {profile.level+1}</span>
            <span>{Math.round(progress())}%</span>
          </div>
          <div style={{height:'16px',background:'#e5e7eb',borderRadius:'8px',overflow:'hidden'}}>
            <div style={{height:'100%',width:`${progress()}%`,background:'linear-gradient(90deg,#10b981,#059669)',transition:'width .6s ease'}}/>
          </div>
        </div>

        {/* Quick actions */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'24px'}}>
          <button onClick={onFreeChat} style={{background:'linear-gradient(135deg,#667eea,#764ba2)',border:'none',color:'white',borderRadius:'16px',padding:'18px',fontSize:'15px',fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',boxShadow:'0 8px 24px rgba(102,126,234,.35)'}}>
            <I.Chat size={20}/> 自由對話
          </button>
          <button onClick={onPronunciation} style={{background:'rgba(255,255,255,.96)',border:'2px solid #e5e7eb',borderRadius:'16px',padding:'18px',fontSize:'15px',fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',color:'#1f2937',boxShadow:'0 8px 24px rgba(0,0,0,.06)'}}>
            <I.Mic size={20}/> 發音測試
          </button>
        </div>

        {/* Learning Path */}
        <h2 style={{display:'flex',alignItems:'center',gap:'10px',fontSize:'24px',fontWeight:800,color:'white',marginBottom:'18px'}}>
          <I.Trend size={22}/> 學習路徑
        </h2>

        {Object.entries(LESSONS).map(([key,path])=>(
          <div key={key} style={{background:'rgba(255,255,255,.96)',borderRadius:'18px',overflow:'hidden',marginBottom:'18px',boxShadow:'0 10px 30px rgba(0,0,0,.09)'}}>
            <div style={{background:path.color,padding:'16px 22px',color:'white'}}>
              <h3 style={{fontWeight:800,fontSize:'18px',margin:0}}>{path.emoji} {path.title}</h3>
            </div>
            <div style={{padding:'16px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:'10px'}}>
              {path.lessons.map((ls,idx)=>{
                const done=profile.completedLessons.includes(ls.id);
                const prevId=idx>0?path.lessons[idx-1].id:null;
                const locked=prevId&&!profile.completedLessons.includes(prevId);
                return(
                  <div key={ls.id} onClick={()=>!locked&&onLesson(ls,key)}
                    style={{background:done?'linear-gradient(135deg,#d1fae5,#a7f3d0)':'white',border:`2px solid ${done?'#10b981':'#e5e7eb'}`,borderRadius:'12px',padding:'14px',cursor:locked?'not-allowed':'pointer',opacity:locked?.5:1,display:'flex',alignItems:'center',gap:'10px',transition:'all .2s'}}
                    onMouseEnter={e=>{ if(!locked) e.currentTarget.style.transform='translateY(-2px)'; }}
                    onMouseLeave={e=>{ e.currentTarget.style.transform=''; }}
                  >
                    <div style={{width:'40px',height:'40px',background:locked?'#9ca3af':`linear-gradient(135deg,${path.color},${path.color}bb)`,borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center',color:'white',flexShrink:0}}>
                      {locked?<I.Lock size={18}/>:typeIcon(ls.type)}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:'14px',color:'#1f2937',marginBottom:'3px'}}>{ls.title}</div>
                      <div style={{display:'flex',alignItems:'center',gap:'3px',color:'#f59e0b',fontWeight:600,fontSize:'12px'}}>
                        <I.Zap size={12}/>{ls.xp} XP
                      </div>
                    </div>
                    {done&&<div style={{width:'24px',height:'24px',background:'#10b981',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'white',flexShrink:0}}><I.Check size={14}/></div>}
                    {!done&&!locked&&<I.Arrow size={16} style={{color:'#9ca3af',flexShrink:0}}/>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ─── App Root ─── */
const App = () => {
  const [view,    setView]    = useState('home');
  const [lesson,  setLesson]  = useState(null);
  const [profile, setProfile] = useState({level:1,totalXP:0,streak:7,completedLessons:[]});

  useEffect(()=>{
    const s=localStorage.getItem('eng_v2');
    if(s) try{setProfile(JSON.parse(s));}catch(e){}
  },[]);

  useEffect(()=>{ localStorage.setItem('eng_v2',JSON.stringify(profile)); },[profile]);

  const addXP = useCallback(amt=>{
    setProfile(p=>{
      const nx=p.totalXP+amt;
      let nl=p.level;
      const xpForLevel=l=>l*500;
      while(nx>=xpForLevel(nl)) nl++;
      if(nl>p.level) setTimeout(()=>alert(`🎉 Level Up！恭喜升到 Level ${nl}！`),300);
      return{...p,totalXP:nx,level:nl};
    });
  },[]);

  const openLesson=(ls,tier)=>{ setLesson({...ls,tier}); setView('lesson'); };
  const finishLesson=()=>{
    if(lesson&&!profile.completedLessons.includes(lesson.id)){
      setProfile(p=>({...p,completedLessons:[...p.completedLessons,lesson.id],streak:p.streak+1}));
      addXP(lesson.xp);
      setTimeout(()=>alert(`🎊 完成！+${lesson.xp} XP！`),100);
    }
    setView('home');
  };

  if(view==='lesson')        return <ChatView key={lesson?.id} lesson={lesson} onBack={()=>setView('home')} onFinish={finishLesson} addXP={addXP}/>;
  if(view==='freeChat')      return <ChatView key="free" lesson={null} onBack={()=>setView('home')} addXP={addXP}/>;
  if(view==='pronunciation') return <PronunciationView onBack={()=>setView('home')} addXP={addXP}/>;
  return <Home profile={profile} onLesson={openLesson} onFreeChat={()=>setView('freeChat')} onPronunciation={()=>setView('pronunciation')}/>;
};

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
